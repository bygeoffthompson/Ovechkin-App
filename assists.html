    <script>
        async function fetchDataAndCreateTable() {
            try {
                const response = await fetch('/goals.json');
                const data = await response.json();

                const counts = {};
                data.forEach(item => {
                    if (item.primary) {
                        if (!counts[item.primary]) counts[item.primary] = { primary: 0, secondary: 0 };
                        counts[item.primary].primary++;
                    }
                    if (item.secondary) {
                        if (!counts[item.secondary]) counts[item.secondary] = { primary: 0, secondary: 0 };
                        counts[item.secondary].secondary++;
                    }
                });

                const tableBody = document.querySelector('tbody');
                Object.entries(counts).forEach(([player, c]) => {
                    const row = tableBody.insertRow();
                    row.insertCell().textContent = player;
                    row.insertCell().textContent = c.primary;
                    row.insertCell().textContent = c.secondary;
                    row.insertCell().textContent = c.primary + c.secondary;
                });
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', fetchDataAndCreateTable);
    </script>

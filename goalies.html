    <script>
        async function fetchDataAndCreateTable() {
            try {
                const response = await fetch('/goals.json');
                const data = await response.json();

                const counts = {};
                data.forEach(item => {
                    if (!item.goalie) return;
                    if (!counts[item.goalie]) counts[item.goalie] = { first: null, last: null, nhl: 0, khl: 0, international: 0, total: 0 };
                    const dateVal = item.year * 10000 + item.month * 100 + item.day;
                    const dateStr = item.month + '/' + item.day + '/' + item.year;
                    if (!counts[item.goalie].first) counts[item.goalie].first = { val: dateVal, str: dateStr };
                    counts[item.goalie].last = { val: dateVal, str: dateStr };
                    if (item.league === 'NHL Regular' || item.league === 'NHL Playoffs') counts[item.goalie].nhl++;
                    else if (item.league === 'KHL') counts[item.goalie].khl++;
                    else if (['World Championships', 'World Cup', 'Olympics'].includes(item.league)) counts[item.goalie].international++;
                    counts[item.goalie].total++;
                });

                const tableBody = document.querySelector('tbody');
                Object.entries(counts).forEach(([goalie, c]) => {
                    const row = tableBody.insertRow();
                    const goalieCell = row.insertCell();
                    const link = document.createElement('a');
                    link.textContent = goalie;
                    link.href = '/?' + goalie.normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase().replace(/\s+/g, '-');
                    goalieCell.appendChild(link);
                    const firstCell = row.insertCell();
                    firstCell.textContent = c.first.str;
                    firstCell.dataset.sort = c.first.val;
                    const lastCell = row.insertCell();
                    if (c.last.val !== c.first.val) {
                        lastCell.textContent = c.last.str;
                        lastCell.dataset.sort = c.last.val;
                    }
                    row.insertCell().textContent = c.nhl;
                    row.insertCell().textContent = c.international;
                    row.insertCell().textContent = c.khl;
                    row.insertCell().textContent = c.total;
                });
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', fetchDataAndCreateTable);
    </script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
